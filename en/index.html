<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ideaprd · Home | ideaprd</title>
  <meta name="description" content="ideaprd English home: static bilingual demo site; navigation is driven by nav.json.">
  <meta property="og:title" content="ideaprd · Home | ideaprd">
  <meta property="og:site_name" content="ideaprd">
  <meta property="og:description" content="ideaprd English home: static bilingual demo site; navigation is driven by nav.json.">
  <meta property="og:url" content="https://prd.ideaprd.com/en/index.html">
  <meta property="og:image" content="https://prd.ideaprd.com/og-cover.png">
  <meta property="og:locale" content="en_US">
  <link rel="icon" href="../assets/brand/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas: #f7f7f4;
      --canvas-soft: #fafaf7;
      --ink: #26251e;
      --body: #5a5852;
      --muted: #807d72;
      --hairline: #e6e5e0;
      --surface-card: #ffffff;
      --primary: #f54e00;
      --primary-active: #d04200;
      --on-primary: #ffffff;
      --rounded-lg: 12px;
      --rounded-md: 8px;
      --nav-h: 64px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, 'Segoe UI', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--body);
      background: var(--canvas);
    }
    a { color: var(--ink); }
    a:hover { text-decoration: underline; }
    .top-nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
    }
    .top-nav .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.02em;
      text-decoration: none;
    }
    .top-nav .brand:hover { text-decoration: none; opacity: 0.85; }
    .brand-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: block;
    }
    .hero-logo {
      display: block;
      width: min(240px, 100%);
      height: auto;
      margin: 0 0 24px;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      color: var(--on-primary);
      background: var(--primary);
      border: none;
      border-radius: var(--rounded-md);
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--primary-active); text-decoration: none; color: var(--on-primary); }
    .layout { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }
    .breadcrumb { font-size: 14px; color: var(--muted); margin: 24px 0 32px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; color: var(--ink); }
    .breadcrumb span { color: var(--ink); }
    .hero { padding: 48px 0 24px; }
    .hero .lead { margin: 0; font-size: 18px; color: var(--body); }
    .section-title {
      margin: 48px 0 16px;
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.11px;
    }
    .nav-card {
      background: var(--surface-card);
      border: 1px solid var(--hairline);
      border-radius: var(--rounded-lg);
      padding: 24px;
    }
    #site-nav .nav-msg { margin: 0; color: var(--muted); font-size: 14px; }
    .nav-tree { list-style: none; margin: 0; padding: 0; }
    .nav-tree > li { margin-bottom: 16px; }
    .nav-tree > li:last-child { margin-bottom: 0; }
    .nav-tree a {
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      color: var(--ink);
    }
    .nav-tree a:hover { text-decoration: underline; }
    .nav-group-title {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .nav-tree-nested { list-style: none; margin: 0; padding: 0 0 0 4px; border-left: 1px solid var(--hairline); }
    .nav-tree-nested li { margin-top: 8px; padding-left: 12px; }
    .site-footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--hairline);
      font-size: 14px;
      color: var(--muted);
    }
    .site-footer p { margin: 0; }
    .site-footer a { color: var(--body); font-weight: 500; }
    .site-footer a:hover { color: var(--ink); }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://prd.ideaprd.com/"},
      {"@type": "ListItem", "position": 2, "name": "ideaprd"}
    ]
  }
  </script>
</head>
<body>
  <header class="top-nav">
    <a class="brand" href="index.html"><img src="../assets/brand/icon.svg" alt="" class="brand-icon" width="28" height="28" decoding="async" aria-hidden="true">ideaprd</a>
    <a href="../zh/index.html" class="btn-primary">中文</a>
  </header>
  <div class="layout">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="../index.html">Home</a> /
      <span>ideaprd</span>
    </nav>
    <main>
      <section class="hero">
        <h1 class="visually-hidden">ideaprd</h1>
        <img src="../assets/brand/logo-en.svg" alt="ideaprd prd.ideaprd.com" class="hero-logo" width="240" height="270" decoding="async">
        <p class="lead">English static demo for 凌霄阁: warm canvas, hairline cards, and a single accent color for primary actions. The list below is rendered from <code style="font-family:'JetBrains Mono',monospace;font-size:13px;">nav.json</code>.</p>
      </section>
      <h2 class="section-title">Contents</h2>
      <div class="nav-card">
        <nav id="site-nav" aria-label="Site map">
          <p class="nav-msg">Loading navigation…</p>
        </nav>
      </div>
    </main>
    <footer class="site-footer">
      <p>Contact: <a href="mailto:mail@ideaprd.com">mail@ideaprd.com</a></p>
    </footer>
  </div>
  <script>
    (function () {
      var mount = document.getElementById('site-nav');
      function buildTree(items) {
        var ul = document.createElement('ul');
        ul.className = 'nav-tree';
        items.forEach(function (entry) {
          var li = document.createElement('li');
          if (entry.children && entry.children.length) {
            var t = document.createElement('div');
            t.className = 'nav-group-title';
            t.textContent = entry.label;
            li.appendChild(t);
            var sub = document.createElement('ul');
            sub.className = 'nav-tree-nested';
            entry.children.forEach(function (child) {
              var cli = document.createElement('li');
              var a = document.createElement('a');
              a.href = child.href;
              a.textContent = child.label;
              cli.appendChild(a);
              sub.appendChild(cli);
            });
            li.appendChild(sub);
          } else if (entry.href) {
            var a2 = document.createElement('a');
            a2.href = entry.href;
            a2.textContent = entry.label;
            li.appendChild(a2);
          }
          ul.appendChild(li);
        });
        return ul;
      }
      function fallback() {
        mount.innerHTML = '';
        mount.appendChild(buildTree([
          { label: 'Introduction', href: 'pages/intro.html' },
          { label: 'Chapter 1', children: [
            { label: '1.1 Background', href: 'pages/chapter-1-background.html' },
            { label: '1.2 Concepts', href: 'pages/chapter-1-concepts.html' }
          ]}
        ]));
        var note = document.createElement('p');
        note.className = 'nav-msg';
        note.style.marginTop = '12px';
        note.textContent = '(Built-in menu when offline or using file://; use an HTTP server to sync nav.json automatically.)';
        mount.appendChild(note);
      }
      fetch('nav.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          mount.innerHTML = '';
          mount.appendChild(buildTree(data));
        })
        .catch(fallback);
    })();
  </script>
</body>
</html>
