      <p>静态站点在 CDN / Pages 上部署简单、成本低、易缓存。多语言拆分 <code>zh/</code> 与 <code>/en/</code> 后，可独立维护文案与导航，同时共享同一套设计令牌。</p>
      <h2>为何用相对路径</h2>
      <p>内容页之间互链使用相对路径，便于在任意子域或预览路径下打开而不破坏链接。</p>
