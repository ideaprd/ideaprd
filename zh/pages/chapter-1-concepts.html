      <p>本章归纳本站实现里的几个关键概念，便于对照仓库文件阅读。</p>
      <h2>导航与内容分离</h2>
      <ul>
        <li><strong>nav.json</strong>：描述菜单树；首页用脚本拉取并渲染链接。</li>
        <li><strong>pages/*.html</strong>：每个页面自包含样式与正文，便于单页修订与缓存。</li>
      </ul>
      <h3>被动收录</h3>
      <div class="card">
        <p>根目录的 <code>robots.txt</code> 通过 <code>Sitemap:</code> 指向 <code>sitemap.xml</code>，列出需要索引的绝对 URL；搜索引擎抓取后即可发现全站结构。</p>
      </div>
    </main>
